# Production stack for Water 3D — single server.
#
#   web         Caddy: static SPA + /api/* proxy + TLS for pb.<domain>
#   pocketbase  auth + field storage (not published; fronted by Caddy)
#
# Setup:
#   cp ../frontend/.env.production.example ../frontend/.env.production   # edit domain + token
#   export DOMAIN=fields.example.com ACME_EMAIL=you@example.com         # or use a .env file
#   docker compose -f docker-compose.prod.yml up -d --build
#   docker compose -f docker-compose.prod.yml exec pocketbase \
#     /usr/local/bin/pocketbase superuser create admin@example.com '<strong-password>'
#
# DNS: point both <domain> and pb.<domain> A records at this server; open 80+443.

name: water3d

services:
  web:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    image: water3d-web:latest
    restart: unless-stopped
    depends_on:
      - pocketbase
    environment:
      DOMAIN: ${DOMAIN:?set DOMAIN (e.g. fields.example.com)}
      ACME_EMAIL: ${ACME_EMAIL:?set ACME_EMAIL for Let's Encrypt}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

  pocketbase:
    # Pin a specific tag for prod (any release >= 0.23 supports the JSVM migrations).
    image: ghcr.io/muchobien/pocketbase:latest
    restart: unless-stopped
    command: ["serve", "--http=0.0.0.0:8090"]
    # Not published to the host — reached only via Caddy at https://pb.<domain>.
    volumes:
      - ../pocketbase/pb_migrations:/pb/pb_migrations:ro
      - pb_data:/pb/pb_data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8090/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  caddy_data:
  caddy_config:
  pb_data:
