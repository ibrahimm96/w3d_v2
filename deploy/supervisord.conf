# Runs PocketBase and Caddy side by side in the single production container.
# Logs from both are relayed to the container's stdout/stderr so
# `docker compose logs -f` shows everything. If either process dies it is
# restarted; if it keeps failing, supervisord exits and Docker's restart policy
# recreates the container.

[supervisord]
nodaemon=true
user=root
logfile=/dev/stdout
logfile_maxbytes=0
pidfile=/run/supervisord.pid

[program:pocketbase]
# Bound to 0.0.0.0 inside the container; only Caddy (same container) and the
# loopback-only host publish in docker-compose.yml can reach it — never public.
command=/usr/local/bin/pocketbase serve --http=0.0.0.0:8090 --dir=/pb/pb_data --migrationsDir=/pb/pb_migrations
autorestart=true
startretries=5
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

[program:caddy]
command=caddy run --config /etc/caddy/Caddyfile --adapter caddyfile
autorestart=true
startretries=5
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
