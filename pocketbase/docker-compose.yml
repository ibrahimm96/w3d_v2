# PocketBase for Water 3D.
#
# On startup PocketBase applies the migrations in ./pb_migrations (creating the
# fields / crop_types / soil_types / openet_cache collections) and serves the
# REST API + admin UI on http://127.0.0.1:8090. The built-in `users` auth
# collection is provided by PocketBase itself.
#
# Quick start:
#   cd pocketbase
#   docker compose up -d
#   # First run only — create the admin (superuser):
#   docker compose exec pocketbase /usr/local/bin/pocketbase superuser create admin@example.com "change-me-please"
#   # Then either manage users at http://127.0.0.1:8090/_/  or let people
#   # self-register through the app's "Sign up" form.
#
# The frontend connects via VITE_POCKETBASE_URL=http://127.0.0.1:8090 (see
# frontend/.env). Data persists in the named `pb_data` volume across restarts.

services:
  pocketbase:
    # Maintained PocketBase image. Pin to a specific version (e.g. :0.28.4) for
    # reproducible builds; any release >= 0.23 supports these JSVM migrations.
    image: ghcr.io/muchobien/pocketbase:latest
    container_name: w3d-pocketbase
    restart: unless-stopped
    command:
      - serve
      - --http=0.0.0.0:8090
    ports:
      - "8090:8090"
    volumes:
      - ./pb_migrations:/pb/pb_migrations:ro
      - pb_data:/pb/pb_data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8090/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pb_data:
